<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>productOS | Server Stopped</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --primary: #3b82f6;
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --border: #27272a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 480px;
            width: 90%;
            text-align: center;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .restart-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 32px;
            text-align: left;
        }

        .restart-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            color: var(--text);
            font-size: 14px;
            word-break: break-all;
        }

        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>Server Stopped</h1>
        <p>The productOS runtime has successfully shut down. All local research tasks have been safely paused.</p>
        
        <div class="restart-box">
            <span class="restart-label">To Restart</span>
            <code>npx productos</code>
        </div>

        <div class="links">
            <a href="https://github.com/AIResearchFactory/ai-researcher">Documentation</a>
            <a href="https://github.com/AIResearchFactory/ai-researcher/issues">Report Issue</a>
        </div>
    </div>
</body>
</html>
