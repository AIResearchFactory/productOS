name: Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'New version (optional). If blank, patch will be bumped (e.g., 0.2.7 -> 0.2.8)'
        required: false
        type: string

jobs:
  test:
    name: Test Suite
    # Strictly restrict to authorized actors
    if: github.repository == 'AIResearchFactory/productOS' && (github.actor == 'aviatam' || github.actor == 'AssafMiron')
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Tests
        run: npm run test:backend

      - name: Frontend Build Verification
        run: npm run build

  publish:
    name: Publish Release
    # Strictly restrict to authorized actors
    if: github.repository == 'AIResearchFactory/productOS' && (github.actor == 'aviatam' || github.actor == 'AssafMiron')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Determine and Bump Version
        id: versioning
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          VERSION_OVERRIDE="${{ github.event.inputs.version_override }}"

          if [ -n "$VERSION_OVERRIDE" ]; then
            NEW_VERSION="$VERSION_OVERRIDE"
            echo "Using version override: $NEW_VERSION"
          else
            # Bump patch version: 0.2.7 -> 0.2.8
            IFS='.' read -ra ADDR <<< "$CURRENT_VERSION"
            if [ ${#ADDR[@]} -lt 3 ]; then
              echo "Error: Unexpected version format $CURRENT_VERSION"
              exit 1
            fi
            NEW_VERSION="${ADDR[0]}.${ADDR[1]}.$((ADDR[2] + 1))"
            echo "Bumping patch version: $CURRENT_VERSION -> $NEW_VERSION"
          fi

          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version

          # Commit and push to the branch this workflow was triggered from
          BRANCH="${{ github.ref_name }}"
          git add package.json
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git push origin "HEAD:$BRANCH"

          # Export for next steps
          echo "RELEASE_TAG=v$NEW_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          echo "Creating and pushing tag: $TAG"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build Frontend
        run: |
          npx tsc
          npx vite build


      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 'productOS ${{ env.RELEASE_TAG }}'
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
