name: Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'New version (optional). If blank, patch will be bumped (e.g., 0.2.7 -> 0.2.8)'
        required: false
        type: string

jobs:
  test:
    name: Test Suite
    # Strictly restrict to authorized actors
    if: github.repository == 'AIResearchFactory/productOS' && (github.actor == 'aviatam' || github.actor == 'AssafMiron')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Backend Tests
        run: npm run test:backend

      - name: Frontend Build Verification
        run: npm run build

  publish:
    name: Publish Release
    # Strictly restrict to authorized actors
    if: github.repository == 'AIResearchFactory/productOS' && (github.actor == 'aviatam' || github.actor == 'AssafMiron')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      id-token: write # Required for NPM provenance
    environment: npm-publish # Manual approval gate
    outputs:
      new_version: ${{ steps.versioning.outputs.NEW_VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm ci

      - name: Determine and Bump Version
        id: versioning
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          VERSION_OVERRIDE="${{ github.event.inputs.version_override }}"

          if [ -n "$VERSION_OVERRIDE" ]; then
            NEW_VERSION="$VERSION_OVERRIDE"
            echo "Using version override: $NEW_VERSION"
          else
            # Bump patch version: 0.2.7 -> 0.2.8
            IFS='.' read -ra ADDR <<< "$CURRENT_VERSION"
            if [ ${#ADDR[@]} -lt 3 ]; then
              echo "Error: Unexpected version format $CURRENT_VERSION"
              exit 1
            fi
            NEW_VERSION="${ADDR[0]}.${ADDR[1]}.$((ADDR[2] + 1))"
            echo "Bumping patch version: $CURRENT_VERSION -> $NEW_VERSION"
          fi

          if [ "$CURRENT_VERSION" != "$NEW_VERSION" ]; then
            # Update package.json
            npm version $NEW_VERSION --no-git-tag-version

            # Commit and push to the branch this workflow was triggered from
            BRANCH="${{ github.ref_name }}"
            git add package.json
            git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
            git push origin "HEAD:$BRANCH"
          else
            echo "Version already at $NEW_VERSION, skipping bump."
          fi

          # Export for next steps
          echo "RELEASE_TAG=v$NEW_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on remote, skipping."
          else
            echo "Creating and pushing tag: $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Build Frontend
        run: |
          npx tsc
          npx vite build

      - name: Publish to NPM
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 'productOS ${{ env.RELEASE_TAG }}'
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release:
    name: Verify Global Installation
    # Strictly restrict to authorized actors
    if: github.repository == 'AIResearchFactory/productOS' && (github.actor == 'aviatam' || github.actor == 'AssafMiron')
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Wait for NPM Package Propagation
        run: |
          echo "Waiting for version ${{ needs.publish.outputs.new_version }} to be available on NPM..."
          npx wait-on --timeout 120000 "https://registry.npmjs.org/productos/${{ needs.publish.outputs.new_version }}"
          echo "Package is available!"

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install productOS globally
        run: npm install -g productos@${{ needs.publish.outputs.new_version }}

      - name: Verify Installation (E2E)
        run: |
          echo "Running E2E tests against globally installed productos..."
          npm ci # Install local deps for playwright runner
          PRODUCTOS_E2E_VERIFY_RELEASE=true CI=true npm run test:e2e:ci
        env:
          PROJECTS_DIR: ${{ github.workspace }}/.test-projects
