name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g., v0.2.4)'
        required: true
        type: string

jobs:
  test:
    name: Test Suite
    if: github.actor == 'aviatam' || github.actor == 'AssafMiron'
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
          
      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          
      - name: Run Backend Tests
        working-directory: ./src-tauri
        run: cargo test --verbose

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Frontend Verification
        run: |
          npm ci
          npm run build

  release:
    if: github.actor == 'aviatam' || github.actor == 'AssafMiron'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          TAG="${{ github.event.inputs.tag_name }}"
          git tag $TAG
          git push origin $TAG

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Generate Release Notes
        id: gen_notes
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          git fetch --prune --unshallow || true
          git fetch --tags || true
          
          # Find the previous release tag if available
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CURRENT_TAG="${{ github.event.inputs.tag_name }}"
          
          echo "Generating notes from $PREV_TAG to $CURRENT_TAG"
          
          export PREV_VERSION=$PREV_TAG
          export CURRENT_VERSION=$CURRENT_TAG
          
          node scripts/generate-release-notes.js
          
          # Safely construct multi-line environment variable for the release body
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "NOTES<<$EOF" >> $GITHUB_ENV
          cat RELEASE_NOTES.md >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "## ⚠️ Beta Security Notice (Windows & macOS)" >> $GITHUB_ENV
          echo "This is a **beta build**. Some systems may show security prompts during first install/run." >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### Windows (SmartScreen)" >> $GITHUB_ENV
          echo "If Windows shows **\"Windows protected your PC\"**:" >> $GITHUB_ENV
          echo "1. Click **More info**" >> $GITHUB_ENV
          echo "2. Click **Run anyway**" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "### macOS (Gatekeeper)" >> $GITHUB_ENV
          echo "If macOS blocks launch:" >> $GITHUB_ENV
          echo "1. Open **System Settings → Privacy & Security**" >> $GITHUB_ENV
          echo "2. Click **Open Anyway** for this app" >> $GITHUB_ENV
          echo "3. Confirm launch" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag_name }}
          releaseName: 'productOS ${{ github.event.inputs.tag_name }}'
          releaseBody: ${{ env.NOTES }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  publish-updater:
    if: github.actor == 'aviatam' || github.actor == 'AssafMiron'
    name: Publish Updater Metadata
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate latest.json + policy.json
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.event.inputs.tag_name }}"
          REPO="${{ github.repository }}"

          # Fetch all assets for the current tag
          ASSETS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG_NAME" | jq '.assets')

          VERSION="${TAG_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          get_url() { echo "$ASSETS" | jq -r ".[] | select(.name | test(\"$1\")) | .browser_download_url" | head -n 1; }
          get_sig() {
            SIG_URL=$(get_url "$1")
            if [ -n "$SIG_URL" ] && [ "$SIG_URL" != "null" ]; then
              curl -sL -H "Authorization: token $GITHUB_TOKEN" "$SIG_URL"
            fi
          }

          PLATFORMS="{}"

          SIG=$(get_sig "darwin-aarch64.*\.sig")
          URL=$(get_url "aarch64\.dmg")
          if [ -n "$SIG" ]; then
            PLATFORMS=$(echo $PLATFORMS | jq ". + {\"darwin-aarch64\": {\"signature\": \"$SIG\", \"url\": \"$URL\"}}")
          fi

          SIG=$(get_sig "darwin-x86_64.*\.sig")
          URL=$(get_url "x64\.dmg")
          if [ -n "$SIG" ]; then
            PLATFORMS=$(echo $PLATFORMS | jq ". + {\"darwin-x86_64\": {\"signature\": \"$SIG\", \"url\": \"$URL\"}}")
          fi

          SIG=$(get_sig "windows-x86_64.*\.sig")
          URL=$(get_url "\.msi")
          if [ -z "$URL" ] || [ "$URL" == "null" ]; then URL=$(get_url "setup\.exe"); fi
          if [ -n "$SIG" ]; then
            PLATFORMS=$(echo $PLATFORMS | jq ". + {\"windows-x86_64\": {\"signature\": \"$SIG\", \"url\": \"$URL\"}}")
          fi

          SIG=$(get_sig "linux-x86_64.*\.sig")
          URL=$(get_url "\.AppImage")
          if [ -n "$SIG" ]; then
            PLATFORMS=$(echo $PLATFORMS | jq ". + {\"linux-x86_64\": {\"signature\": \"$SIG\", \"url\": \"$URL\"}}")
          fi

          echo "{\"version\":\"$VERSION\",\"notes\":\"Release $TAG_NAME\",\"pub_date\":\"$DATE\",\"platforms\":$PLATFORMS}" > latest.json

          # Enforce required updater platforms for release quality
          jq -e '.platforms["windows-x86_64"].signature and .platforms["windows-x86_64"].url' latest.json >/dev/null
          jq -e '.platforms["darwin-aarch64"].signature and .platforms["darwin-aarch64"].url' latest.json >/dev/null

          # Optional forced-update policy scaffold (min_supported_version can be raised for critical updates)
          echo "{\"min_supported_version\":\"$VERSION\",\"critical\":false,\"message\":\"Please update to the latest version for best stability and security fixes.\"}" > policy.json

          echo "Generated latest.json:"
          cat latest.json
          echo "Generated policy.json:"
          cat policy.json

      - name: Upload updater metadata to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            latest.json
            policy.json
          tag_name: ${{ github.event.inputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
