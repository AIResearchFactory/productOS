name: AI Code Review (Cursor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Cursor AI Review
    if: github.event.sender.type != 'Bot' && (github.event_name == 'issue_comment' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Secrets
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "GEMINI_API_KEY is empty"; else echo "GEMINI_API_KEY is set"; fi
          if [ -z "${{ secrets.GOOGLE_AI_STUDIO_KEY }}" ]; then echo "GOOGLE_AI_STUDIO_KEY is empty"; else echo "GOOGLE_AI_STUDIO_KEY is set"; fi

      - name: Cursor AI Code Review
        uses: Codium-ai/pr-agent@main
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GOOGLE_AI_STUDIO_KEY || secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_CONFIG__AI_PROVIDER: "google"
          PR_CONFIG__MODEL: "gemini/gemini-1.5-flash"
          PR_GITHUB_ACTION_CONFIG__AUTO_REVIEW: true
          PR_GITHUB_ACTION_CONFIG__HANDLE_PR_ACTIONS: '["opened", "reopened", "synchronize"]'
          PR_GITHUB_ACTION_CONFIG__PR_AGENT_ACTION: '/review'
          PR_REVIEWER__REQUIRE_SCORE_REVIEW: true
          PR_REVIEWER__REQUIRE_SECURITY_REVIEW: true
          PR_REVIEWER__REQUIRE_TESTS_REVIEW: true
          PR_REVIEWER__INLINE_CODE_COMMENTS: true
