name: AI Code Review (Cursor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Cursor AI Review
    if: github.event.sender.type != 'Bot' && (github.event_name == 'issue_comment' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cursor AI Code Review
        uses: Codium-ai/pr-agent@main
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AGENT_CONFIG: |
            config:
              model: "gemini/gemini-1.5-pro"
              temperature: 0.1
            pr_reviewer:
              require_score_review: true
              require_security_review: true
              require_tests_review: true
              inline_code_comments: true
            github_action_config:
              auto_review: true
              handle_pr_actions: ["opened", "reopened", "synchronize"]
