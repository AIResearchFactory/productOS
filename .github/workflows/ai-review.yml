name: AI Code Review (Cursor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Cursor AI Review
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cursor AI Code Review
        uses: Codium-ai/pr-agent@main
        env:
          GOOGLE_AI_STUDIO_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AGENT_CONFIG: |
            config:
              model: "gemini-2.0-flash"
              ai_provider: "google"
            github_action_config:
              auto_review: true
              handle_pr_actions: ["opened", "reopened", "synchronize"]
