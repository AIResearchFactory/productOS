name: AI Code Review (Cursor)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Cursor AI Review
    if: github.event.sender.type != 'Bot' && (github.event_name == 'issue_comment' || github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cursor AI Code Review
        uses: Codium-ai/pr-agent@main
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_CONFIG.MODEL: "gemini/gemini-3.0-flash"
          PR_CONFIG.CUSTOM_MODEL_MAX_TOKENS: 1000000
          PR_GITHUB_ACTION_CONFIG.AUTO_REVIEW: true
          PR_GITHUB_ACTION_CONFIG.HANDLE_PR_ACTIONS: '["opened", "reopened", "synchronize"]'
          PR_GITHUB_ACTION_CONFIG.PR_AGENT_ACTION: '/review'
          PR_REVIEWER.REQUIRE_SCORE_REVIEW: true
          PR_REVIEWER.REQUIRE_SECURITY_REVIEW: true
          PR_REVIEWER.REQUIRE_TESTS_REVIEW: true
          PR_REVIEWER.INLINE_CODE_COMMENTS: true
