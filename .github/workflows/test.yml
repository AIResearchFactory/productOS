name: Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.platform }})
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Cost Optimization: Use only Ubuntu for PRs to save expensive macOS (10x) and Windows (2x) minutes.
        # Run full cross-platform suite only on main branch merges or manual runs.
        platform: ${{ fromJSON((github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && '["macos-latest", "ubuntu-22.04", "windows-latest"]' || '["ubuntu-22.04"]') }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security Scan (Vulnerabilities)
        run: npm audit --audit-level=high

      - name: Run Backend Tests
        run: npm run test:backend

      - name: Frontend Verification (Build)
        run: npm run build

  e2e:
    name: E2E (${{ matrix.platform }}, shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    needs: verify
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Keep PR cost low by sharding Ubuntu only; run all platforms for manual/main runs.
        platform: ${{ fromJSON((github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && '["macos-latest", "ubuntu-22.04", "windows-latest"]' || '["ubuntu-22.04"]') }}
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Playwright Browser
        timeout-minutes: 10
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]] && command -v google-chrome >/dev/null 2>&1; then
            google-chrome --version
            echo "PRODUCTOS_E2E_USE_SYSTEM_CHROME=true" >> "$GITHUB_ENV"
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run E2E Tests (Playwright)
        run: npm run test:e2e:ci -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          PROJECTS_DIR: ${{ github.workspace }}/.test-projects

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.platform }}-shard-${{ matrix.shardIndex }}-of-${{ matrix.shardTotal }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.platform }}-shard-${{ matrix.shardIndex }}-of-${{ matrix.shardTotal }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 7
