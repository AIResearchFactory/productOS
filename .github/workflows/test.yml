name: Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.agent/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Suite
    strategy:
      fail-fast: false
      matrix:
        # Cost Optimization: Use only Ubuntu for PRs to save expensive macOS (10x) and Windows (2x) minutes.
        # Run full cross-platform suite only on main branch merges or manual runs.
        platform: ${{ fromJSON((github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && '["macos-latest", "ubuntu-22.04", "windows-latest"]' || '["ubuntu-22.04"]') }}
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security Scan (Vulnerabilities)
        run: npm audit --audit-level=high

      - name: Run Backend Tests
        run: npm run test:backend

      - name: Frontend Verification (Build)
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests (Playwright)
        run: npm run test:e2e:ci
        env:
          PROJECTS_DIR: ${{ github.workspace }}/.test-projects

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.platform }}
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ matrix.platform }}
          path: test-results/
          if-no-files-found: warn
          retention-days: 7
