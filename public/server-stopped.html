<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>productOS | Server Stopped</title>
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --primary: #3b82f6;
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --border: #27272a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 480px;
            width: 90%;
            text-align: center;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .logo {
            font-size: 64px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .restart-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 32px;
            text-align: left;
        }

        .restart-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            color: var(--text);
            font-size: 14px;
            word-break: break-all;
        }

        .links {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--primary);
        }

        .server-stopped-img {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reconnect-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 24px;
            width: 100%;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .reconnect-button:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .reconnect-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .reconnect-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-msg {
            font-size: 14px;
            margin-top: -16px;
            margin-bottom: 24px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="status-image" class="server-stopped-img" src="" alt="Work finished">
        <h1>Server Stopped</h1>
        <p>The productOS runtime has successfully shut down. All local research tasks have been safely paused.</p>
        
        <div class="restart-box">
            <span class="restart-label">To Restart</span>
            <code>npx productos</code>
        </div>

        <button id="reconnect-btn" class="reconnect-button">
            <span id="btn-text">Check Connection</span>
            <div id="btn-loader" class="loader" style="display: none;"></div>
        </button>
        <p id="status-message" class="status-msg"></p>

        <div class="links">
            <a href="https://github.com/AIResearchFactory/ai-researcher">Documentation</a>
            <a href="https://github.com/AIResearchFactory/ai-researcher/issues">Report Issue</a>
        </div>
    </div>

    <script>
        const images = [
            'assets/server-stopped-1.jpg',
            'assets/server-stopped-2.jpg'
        ];
        const randomImage = images[Math.floor(Math.random() * images.length)];
        document.getElementById('status-image').src = randomImage;

        const reconnectBtn = document.getElementById('reconnect-btn');
        const btnText = document.getElementById('btn-text');
        const btnLoader = document.getElementById('btn-loader');
        const statusMsg = document.getElementById('status-message');

        reconnectBtn.addEventListener('click', async () => {
            // Reset state
            reconnectBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline-block';
            statusMsg.style.display = 'none';

            try {
                // Try to reach the server health endpoint
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                
                const response = await fetch('/api/health', { signal: controller.signal });
                clearTimeout(timeoutId);

                if (response.ok) {
                    statusMsg.textContent = 'Server is back up! Redirecting...';
                    statusMsg.style.color = '#10b981';
                    statusMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    throw new Error('Server returned ' + response.status);
                }
            } catch (e) {
                console.error('Reconnect failed:', e);
                statusMsg.textContent = 'Server is still down. Make sure to run the restart command.';
                statusMsg.style.color = '#ef4444';
                statusMsg.style.display = 'block';
                
                reconnectBtn.disabled = false;
                btnText.style.display = 'inline-block';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
