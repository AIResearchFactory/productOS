<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>productOS | Offline</title>
    <meta name="theme-color" content="#09090b">
    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --primary: #3b82f6;
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --border: #27272a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            max-width: 480px;
            width: 90%;
            text-align: center;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .offline-img {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .retry-button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .retry-button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .retry-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="offline-img" src="/assets/offline.jpg" alt="Alex and Sarah confused in sprint planning">
        <h1>What did I forget in the sprint planning?</h1>
        <p>It seems you are currently offline and the requested page could not be reached.</p>
        
        <div style="text-align: left; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2); padding: 16px; border-radius: 12px; margin-bottom: 24px;">
            <span style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary); font-weight: 600; margin-bottom: 8px; display: block;">Troubleshooting</span>
            <ul style="margin: 0; padding-left: 20px; color: var(--text); font-size: 14px;">
                <li>Check your internet connection.</li>
                <li>Ensure the local ProductOS server is running.</li>
            </ul>
        </div>

        <button id="retry-btn" class="retry-button">Try Again</button>
    </div>

    <script>
        document.getElementById('retry-btn').addEventListener('click', () => {
            window.location.reload();
        });

        // Also auto-reload when coming back online
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
