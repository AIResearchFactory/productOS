<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History Importer UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card">
        <h1>Conversation History Importer</h1>
        <p class="muted">Provider-agnostic importer (OpenAI tested first).</p>

        <label>Provider</label>
        <select id="provider">
          <option value="openai">OpenAI</option>
          <option value="claude">Claude (stub)</option>
        </select>

        <label>Export JSON File</label>
        <input id="fileInput" type="file" accept="application/json" />

        <button id="importBtn">Import</button>
        <p id="status" class="status"></p>
      </section>

      <section class="card">
        <h2>Import Results</h2>
        <div id="stats" class="stats"></div>
      </section>

      <section class="card">
        <h2>Conversations</h2>
        <div id="conversations" class="conversations"></div>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
